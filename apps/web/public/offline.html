<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#172033" />
    <title>Driver Delivery Offline</title>
    <style>
      body {
        align-items: center;
        background: #f6f8fb;
        color: #172033;
        display: flex;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 18px;
      }
      main {
        background: white;
        border: 1px solid #dbe3ec;
        border-radius: 8px;
        max-width: 420px;
        padding: 22px;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }
      p {
        color: #667085;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>The driver app cannot reach the network right now. Reopen the app when your connection returns to sync assigned deliveries and status updates.</p>
    </main>
  </body>
</html>
